<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通勤等时圈</title>
  <script>
    window._AMapSecurityConfig = { securityJsCode: 'e808269f0141b67e76ee446b1542b3c0' };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=1cf0650cf8cc24f862e1d3a1d023b93c&plugin=AMap.InfoWindow"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6/dist/d3-delaunay.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶栏 ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      white-space: nowrap;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { background: #30363d; color: #e6edf3; }

    /* 模式切换 */
    .mode-tabs {
      display: flex;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-tab {
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #8b949e;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .mode-tab.active {
      background: #1f6feb;
      color: #fff;
    }
    .mode-tab:hover:not(.active) { background: #30363d; color: #e6edf3; }

    /* 目标地点 */
    #target-info {
      font-size: 12px;
      color: #8b949e;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #target-info span { color: #58a6ff; }

    /* 图层开关 */
    .layer-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .layer-btn.active {
      background: #0d419d;
      border-color: #1f6feb;
      color: #58a6ff;
    }
    .layer-btn:hover:not(.active) { background: #30363d; color: #e6edf3; }

    /* 状态 */
    #status {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }
    #status.loading { color: #f0883e; }
    #status.ok { color: #3fb950; }
    #status.error { color: #f85149; }

    /* ── 地图 ── */
    #map {
      flex: 1;
      position: relative;
    }

    /* ── 图例 ── */
    #legend {
      position: absolute;
      bottom: 24px;
      right: 12px;
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 14px;
      z-index: 200;
      backdrop-filter: blur(8px);
    }
    #legend h4 {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      font-size: 12px;
      color: #c9d1d9;
    }
    .legend-swatch {
      width: 28px;
      height: 10px;
      border-radius: 3px;
      opacity: 0.85;
    }

    /* ── 无数据提示 ── */
    #no-data {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 300;
    }
    #no-data h2 { font-size: 20px; color: #8b949e; margin-bottom: 8px; }
    #no-data p { font-size: 13px; color: #6e7681; max-width: 320px; line-height: 1.6; }
    #no-data code {
      display: block;
      margin-top: 12px;
      padding: 8px 12px;
      background: #21262d;
      border-radius: 6px;
      font-size: 11px;
      color: #58a6ff;
      text-align: left;
      font-family: monospace;
    }

    /* ── 目标标记样式 ── */
    .target-marker {
      width: 20px;
      height: 20px;
      background: #f0883e;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<div id="topbar">
  <a href="index.html" class="back-btn">← 返回</a>
  <h1>通勤等时圈</h1>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="driving">🚗 驾车</button>
    <button class="mode-tab" data-mode="transit">🚇 公交</button>
  </div>

  <div id="target-info">目标: <span id="target-name">-</span></div>

  <button class="layer-btn active" id="layer-toggle">
    <span>◉</span> 等时圈图层
  </button>

  <div id="status">初始化中…</div>
</div>

<div id="map">
  <div id="no-data">
    <h2>暂无预计算数据</h2>
    <p>请先运行预计算脚本生成通勤数据：</p>
    <code>node scripts/precompute_commute_iso.mjs \<br>
  --target-lng &lt;工作地点经度&gt; \<br>
  --target-lat &lt;工作地点纬度&gt; \<br>
  --mode driving</code>
    <p style="margin-top:10px">或从主页面的「职业」面板中设置工作地点后点击「预计算」</p>
  </div>

  <div id="legend">
    <h4>通勤时间（分钟）</h4>
    <div style="width:140px;height:12px;border-radius:4px;margin-bottom:6px;background:linear-gradient(to right,rgb(26,150,65),rgb(90,200,90),rgb(199,233,173),rgb(247,229,106),rgb(244,110,55),rgb(215,25,28));opacity:0.85"></div>
    <div id="legend-labels" style="display:flex;justify-content:space-between;font-size:11px;color:#8b949e">
      <span>0</span><span>12</span><span>30</span><span>48</span><span>60+</span>
    </div>
  </div>
</div>

<script>
// ── 颜色配置（按模式独立色阶）────────────────────────────────────────────────
// driving: 上限60min；transit: 上限120min，锚点按实际分布(p10=53,p50=81,p90=121)对齐
const SCALE_MAX = { driving: 65, transit: 65 };
let currentScaleMax = 65;

// 各模式独立锚点：[分钟数, r, g, b]，直接用绝对分钟数
// 统一12档色阶：0-15-20-25-30-35-40-45-50-55-60-60+
const COLOR_STOPS_UNIFIED = [
  [ 0,  26, 150,  65],  // 深绿
  [15,  55, 180,  70],
  [20,  90, 200,  90],  // 绿
  [25, 145, 215, 120],
  [30, 199, 233, 173],  // 浅绿
  [35, 230, 240, 130],
  [40, 247, 229, 106],  // 黄
  [45, 247, 200,  90],
  [50, 244, 180,  79],  // 橙黄
  [55, 244, 145,  65],
  [60, 244, 110,  55],  // 橙红
  [65, 215,  25,  28],  // 红（60+）
];
const COLOR_STOPS = {
  driving: COLOR_STOPS_UNIFIED,
  transit: COLOR_STOPS_UNIFIED,
};
let currentStops = COLOR_STOPS.driving;

function minutesToColor(minutes) {
  if (minutes == null) return '#888888';
  const stops = currentStops;
  const max = currentScaleMax;
  if (minutes >= max) return `rgb(${stops[stops.length-1].slice(1).join(',')})`;
  // 在锚点间线性插值
  for (let i = 1; i < stops.length; i++) {
    if (minutes <= stops[i][0]) {
      const t = (minutes - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
      const r = Math.round(stops[i-1][1] + t*(stops[i][1]-stops[i-1][1]));
      const g = Math.round(stops[i-1][2] + t*(stops[i][2]-stops[i-1][2]));
      const b = Math.round(stops[i-1][3] + t*(stops[i][3]-stops[i-1][3]));
      return `rgb(${r},${g},${b})`;
    }
  }
  return `rgb(${stops[stops.length-1].slice(1).join(',')})`;
}

function minutesToTierLabel(m) {
  if (m == null) return '未知';
  if (m <= 15) return '≤15 min';
  if (m <= 25) return '15–25 min';
  if (m <= 35) return '25–35 min';
  if (m <= 45) return '35–45 min';
  if (m <= 55) return '45–55 min';
  return `${m} min`;
}

// 更新图例色条
function updateLegend(mode) {
  const stops = COLOR_STOPS[mode];
  const labels = stops.map(s => s[0]);
  const leg = document.getElementById('legend-labels');
  if (leg) leg.innerHTML = labels.map((v,i) => `<span>${i===labels.length-1?v+'+':v}</span>`).join('');
  // 更新渐变条颜色
  const bar = document.querySelector('#legend > div[style]');
  if (bar) {
    const gradStops = stops.map((s,i) => `rgb(${s[1]},${s[2]},${s[3]}) ${Math.round(i/(stops.length-1)*100)}%`).join(',');
    bar.style.background = `linear-gradient(to right,${gradStops})`;
  }
}

// ── 状态 ─────────────────────────────────────────────────────────────────────
let map = null;
let currentMode = 'driving';
let layerOn = true;
let isoPolygons = [];     // 当前渲染的 AMap.Polygon[]
let targetMarker = null;
let dataCache = {};       // { driving: {...}, transit: {...} }

// ── 读取工作地点 ─────────────────────────────────────────────────────────────
function getTargetFromStorage() {
  try {
    // 从 localStorage 读（与主页面共享）
    const raw = localStorage.getItem('commuteTargets');
    if (raw) {
      const targets = JSON.parse(raw);
      if (targets && targets.length > 0) return targets[0];
    }
    // URL 参数 fallback
    const params = new URLSearchParams(location.search);
    const lng = parseFloat(params.get('lng'));
    const lat = parseFloat(params.get('lat'));
    const name = params.get('name') || '工作地点';
    if (lng && lat) return { lng, lat, name };
  } catch (e) {}
  return null;
}

// ── 状态工具 ─────────────────────────────────────────────────────────────────
const $status = document.getElementById('status');
function setStatus(msg, cls = '') {
  $status.textContent = msg;
  $status.className = cls;
}

// ── 数据加载 ─────────────────────────────────────────────────────────────────
async function loadData(mode) {
  if (dataCache[mode]) return dataCache[mode];

  const paths = [
    `../data/processed/commute_iso_${mode}.json`,
    `./data/processed/commute_iso_${mode}.json`,
  ];

  for (const p of paths) {
    try {
      const res = await fetch(p);
      if (!res.ok) continue;
      const data = await res.json();
      dataCache[mode] = data;
      return data;
    } catch (e) {}
  }
  return null;
}

// ── 清除图层 ─────────────────────────────────────────────────────────────────
function clearPolygons() {
  isoPolygons.forEach(p => map.remove(p));
  isoPolygons = [];
}

// ── Delaunay 三角渲染 ────────────────────────────────────────────────────────
//
// 思路：
//   1. 取所有有效点（有 tier 值）
//   2. 用 d3-delaunay 构建 Voronoi 图
//   3. 每个 Voronoi 胞元按其对应小区的 tier 着色
//   4. 渲染为 AMap.Polygon（半透明填充）
//
function renderIsochrone(data) {
  clearPolygons();
  if (!data || !data.points || data.points.length === 0) return;

  const points = data.points.filter(p => p.minutes != null && p.lat && p.lng);
  if (points.length === 0) return;

  setStatus(`渲染 ${points.length} 个点...`, 'loading');

  const coords = points.map(p => [p.lng, p.lat]);

  const bounds = map.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const pad = 0.3;
  const extent = [
    sw.getLng() - pad,
    sw.getLat() - pad,
    ne.getLng() + pad,
    ne.getLat() + pad,
  ];

  const delaunay = d3.Delaunay.from(coords);
  const voronoi = delaunay.voronoi(extent);

  // 预计算每个点的邻居分钟数（用于边缘渐变判断）
  const neighborMinutes = points.map((_, i) => {
    const neighbors = [...delaunay.neighbors(i)];
    return neighbors.map(j => points[j].minutes);
  });

  const polygons = [];

  for (let i = 0; i < points.length; i++) {
    const cell = voronoi.cellPolygon(i);
    if (!cell) continue;

    const p = points[i];
    const color = minutesToColor(p.minutes);

    // 计算与邻居的最大分钟差，差距大则边缘感更强，opacity 稍低做柔化
    const nbMins = neighborMinutes[i];
    const maxDiff = nbMins.length
      ? Math.max(...nbMins.map(m => Math.abs(m - p.minutes)))
      : 0;
    // 差距 ≤5min → opacity 0.7（同色区域饱满）；差距 ≥20min → opacity 0.38（跨色边缘柔化）
    const fillOpacity = Math.max(0.38, 0.7 - (Math.min(maxDiff, 20) / 20) * 0.32);

    const path = cell.map(([lng, lat]) => [lng, lat]);

    const poly = new AMap.Polygon({
      path,
      fillColor: color,
      fillOpacity,
      strokeColor: color,
      strokeOpacity: 0.15,
      strokeWeight: 0.3,
    });

    poly.on('click', () => {
      const info = new AMap.InfoWindow({
        content: `<div style="padding:8px;font-size:13px;line-height:1.8">
          <b>${p.name}</b><br>
          通勤时间: <b>${p.minutes} 分钟</b><br>
          档位: ${minutesToTierLabel(p.minutes)}
        </div>`,
        offset: new AMap.Pixel(0, -10),
      });
      info.open(map, new AMap.LngLat(p.lng, p.lat));
    });

    polygons.push(poly);
  }

  map.add(polygons);
  isoPolygons = polygons;

  setStatus(`已渲染 ${points.length} 个小区`, 'ok');
}

// ── 切换模式 ─────────────────────────────────────────────────────────────────
async function switchMode(mode) {
  currentMode = mode;
  currentScaleMax = SCALE_MAX[mode];
  currentStops = COLOR_STOPS[mode];
  updateLegend(mode);

  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });

  if (!layerOn) return;

  setStatus('加载数据…', 'loading');
  const data = await loadData(mode);

  if (!data) {
    clearPolygons();
    document.getElementById('no-data').style.display = 'block';
    setStatus('无数据', 'error');
    return;
  }

  document.getElementById('no-data').style.display = 'none';

  // 验证 target 匹配
  const target = getTargetFromStorage();
  if (target && data._meta) {
    const m = data._meta;
    const dist = Math.hypot(m.target.lng - target.lng, m.target.lat - target.lat);
    if (dist > 0.01) {
      setStatus(`⚠ 数据目标与当前工作地点不同 (dist=${dist.toFixed(3)})`, 'loading');
    }
  }

  renderIsochrone(data);
}

// ── 图层开关 ─────────────────────────────────────────────────────────────────
function toggleLayer() {
  layerOn = !layerOn;
  const btn = document.getElementById('layer-toggle');
  btn.classList.toggle('active', layerOn);

  if (layerOn) {
    switchMode(currentMode);
  } else {
    clearPolygons();
    setStatus('图层已关闭');
  }
}

// ── 目标标记 ─────────────────────────────────────────────────────────────────
function placeTargetMarker(target) {
  if (targetMarker) map.remove(targetMarker);

  const marker = new AMap.Marker({
    position: [target.lng, target.lat],
    content: '<div class="target-marker"></div>',
    offset: new AMap.Pixel(-10, -10),
    zIndex: 200,
    title: target.name,
  });
  map.add(marker);
  targetMarker = marker;

  document.getElementById('target-name').textContent = target.name || `${target.lng.toFixed(4)}, ${target.lat.toFixed(4)}`;
}

// ── 初始化 ───────────────────────────────────────────────────────────────────
function init() {
  map = new AMap.Map('map', {
    center: [121.4737, 31.2304],
    zoom: 11,
    mapStyle: 'amap://styles/dark',
    features: ['bg', 'road', 'building'],
  });

  // 先加载数据，从数据 _meta 读目标坐标；localStorage 作为 fallback
  setStatus('加载数据…', 'loading');
  currentScaleMax = SCALE_MAX[currentMode];
  currentStops = COLOR_STOPS[currentMode];
  updateLegend(currentMode);
  loadData(currentMode).then(data => {
    if (data) {
      document.getElementById('no-data').style.display = 'none';
      // 优先用数据文件里的 target
      const metaTarget = data._meta?.target;
      const storageTarget = getTargetFromStorage();
      const target = metaTarget
        ? { lng: metaTarget.lng, lat: metaTarget.lat, name: storageTarget?.name || '新漕河泾商务中心B座' }
        : storageTarget;
      if (target) {
        placeTargetMarker(target);
        map.setCenter([target.lng, target.lat]);
      }
      renderIsochrone(data);
    } else {
      // 数据不存在，尝试 localStorage
      const target = getTargetFromStorage();
      if (target) {
        placeTargetMarker(target);
        map.setCenter([target.lng, target.lat]);
      } else {
        document.getElementById('target-name').textContent = '未设置（请在主页面职业面设置）';
      }
      document.getElementById('no-data').style.display = 'block';
      setStatus('无预计算数据', 'error');
    }
  });

  // 模式切换
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.mode));
  });

  // 图层开关
  document.getElementById('layer-toggle').addEventListener('click', toggleLayer);

  // 地图缩放后重新渲染（Voronoi extent 需更新）
  map.on('zoomend', () => {
    if (layerOn && dataCache[currentMode]) {
      renderIsochrone(dataCache[currentMode]);
    }
  });
}

// d3-delaunay 挂载检查
function waitForD3(cb) {
  if (window.d3 && window.d3.Delaunay) { cb(); return; }
  let t = 0;
  const id = setInterval(() => {
    t += 100;
    if (window.d3 && window.d3.Delaunay) { clearInterval(id); cb(); }
    else if (t > 5000) { clearInterval(id); setStatus('d3-delaunay 加载失败', 'error'); }
  }, 100);
}

if (window.AMap) {
  waitForD3(init);
} else {
  window.onload = () => waitForD3(init);
}
</script>
</body>
</html>
