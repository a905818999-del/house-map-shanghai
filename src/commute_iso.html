<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通勤等时圈</title>
  <script>
    window._AMapSecurityConfig = { securityJsCode: 'e808269f0141b67e76ee446b1542b3c0' };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=1cf0650cf8cc24f862e1d3a1d023b93c&plugin=AMap.InfoWindow,AMap.CircleMarker"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6/dist/d3-delaunay.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      white-space: nowrap;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { background: #30363d; color: #e6edf3; }

    .mode-tabs {
      display: flex;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-tab {
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #8b949e;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .mode-tab.active {
      background: #1f6feb;
      color: #fff;
    }
    .mode-tab:hover:not(.active) { background: #30363d; color: #e6edf3; }

    #target-info {
      font-size: 12px;
      color: #8b949e;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #target-info span { color: #58a6ff; }

    .layer-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .layer-btn.active {
      background: #0d419d;
      border-color: #1f6feb;
      color: #58a6ff;
    }
    .layer-btn:hover:not(.active) { background: #30363d; color: #e6edf3; }

    #status {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }
    #status.loading { color: #f0883e; }
    #status.ok { color: #3fb950; }
    #status.error { color: #f85149; }

    #map {
      flex: 1;
      position: relative;
    }

    #legend {
      position: absolute;
      bottom: 24px;
      right: 12px;
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 14px;
      z-index: 200;
      backdrop-filter: blur(8px);
    }
    #legend h4 {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      font-size: 12px;
      color: #c9d1d9;
    }
    .legend-swatch {
      width: 28px;
      height: 10px;
      border-radius: 3px;
      opacity: 0.85;
    }

    #no-data {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 300;
    }
    #no-data h2 { font-size: 20px; color: #8b949e; margin-bottom: 8px; }
    #no-data p { font-size: 13px; color: #6e7681; max-width: 320px; line-height: 1.6; }
    #no-data code {
      display: block;
      margin-top: 12px;
      padding: 8px 12px;
      background: #21262d;
      border-radius: 6px;
      font-size: 11px;
      color: #58a6ff;
      text-align: left;
      font-family: monospace;
    }

    .target-marker {
      width: 20px;
      height: 20px;
      background: #f0883e;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* 小区标签（zoom≥13 时显示）*/
    .community-label {
      background: transparent;
      border: none;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="topbar">
  <a href="index.html" class="back-btn">← 返回</a>
  <h1>通勤等时圈</h1>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="driving">🚗 驾车</button>
    <button class="mode-tab" data-mode="transit">🚇 公交</button>
  </div>

  <div id="target-info">目标: <span id="target-name">-</span></div>

  <button class="layer-btn active" id="layer-toggle">
    <span>◉</span> 等时圈图层
  </button>

  <div id="status">初始化中…</div>
</div>

<div id="map">
  <div id="no-data">
    <h2>暂无预计算数据</h2>
    <p>请先运行预计算脚本生成通勤数据：</p>
    <code>node scripts/precompute_commute_iso.mjs \<br>
  --target-lng &lt;工作地点经度&gt; \<br>
  --target-lat &lt;工作地点纬度&gt; \<br>
  --mode driving</code>
  </div>

  <div id="legend">
    <h4>通勤时间</h4>
    <div class="legend-item"><div class="legend-swatch" style="background:#1a9641"></div> ≤ 15 分钟</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#74c476"></div> 15 – 25 分钟</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#c7e9ad"></div> 25 – 35 分钟</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f7e56a"></div> 35 – 45 分钟</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f4854f"></div> 45 – 55 分钟</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#d7191c"></div> 55+ 分钟</div>
  </div>
</div>

<script>
const TIER_COLORS = [
  '#1a9641', // 0: ≤15
  '#74c476', // 1: 15-25
  '#c7e9ad', // 2: 25-35
  '#f7e56a', // 3: 35-45
  '#f4854f', // 4: 45-55
  '#d7191c', // 5: 55+
];

const TIER_LABELS = ['≤15 min', '15–25 min', '25–35 min', '35–45 min', '45–55 min', '55+ min'];

// 缩放阈值：>= 此值切换到标签模式
const ZOOM_DETAIL = 13;

let map = null;
let currentMode = 'driving';
let layerOn = true;
let isoLayers = [];     // Polygon[] 或 Marker[]
let targetMarker = null;
let dataCache = {};
let infoWindow = null;

function getTargetFromStorage() {
  try {
    const raw = localStorage.getItem('commuteTargets');
    if (raw) {
      const targets = JSON.parse(raw);
      if (targets && targets.length > 0) return targets[0];
    }
    const params = new URLSearchParams(location.search);
    const lng = parseFloat(params.get('lng'));
    const lat = parseFloat(params.get('lat'));
    const name = params.get('name') || '工作地点';
    if (lng && lat) return { lng, lat, name };
  } catch (e) {}
  return null;
}

const $status = document.getElementById('status');
function setStatus(msg, cls = '') {
  $status.textContent = msg;
  $status.className = cls;
}

async function loadData(mode) {
  if (dataCache[mode]) return dataCache[mode];
  const paths = [
    `../data/processed/commute_iso_${mode}.json`,
    `./data/processed/commute_iso_${mode}.json`,
  ];
  for (const p of paths) {
    try {
      const res = await fetch(p);
      if (!res.ok) continue;
      const data = await res.json();
      dataCache[mode] = data;
      return data;
    } catch (e) {}
  }
  return null;
}

function clearLayers() {
  if (isoLayers.length > 0) map.remove(isoLayers);
  isoLayers = [];
}

// ── Voronoi 多边形模式（zoom < ZOOM_DETAIL）────────────────────────────────────
//
// 用 d3-delaunay 计算 Voronoi，裁剪到上海大致范围，按 tier 填色
//
function renderVoronoi(points) {
  const size = map.getSize();
  const W = size.width, H = size.height;

  // 地图像素坐标转换
  function lnglatToPixel(lng, lat) {
    const px = map.lngLatToContainer([lng, lat]);
    return [px.x, px.y];
  }

  const coords = points.map(p => lnglatToPixel(p.lng, p.lat));
  const delaunay = d3.Delaunay.from(coords);
  const voronoi = delaunay.voronoi([-200, -200, W + 200, H + 200]);

  // 5px 梯度渐变：沿单元格边缘加 5px 扩展用于柔化（简化：用 strokeWeight 叠加）
  const polygons = points.map((p, i) => {
    const cell = voronoi.cellPolygon(i);
    if (!cell) return null;

    const path = cell.map(([px, py]) => {
      const lnglat = map.containerToLngLat([px, py]);
      return [lnglat.lng, lnglat.lat];
    });

    const color = TIER_COLORS[p.tier];
    const poly = new AMap.Polygon({
      path,
      fillColor: color,
      fillOpacity: 0.72,
      strokeColor: color,
      strokeOpacity: 0.4,
      strokeWeight: 1,
      cursor: 'pointer',
      zIndex: 10,
    });

    poly.on('click', () => {
      if (!infoWindow) infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -8) });
      infoWindow.setContent(
        `<div style="padding:8px 10px;font-size:13px;line-height:1.8;color:#222">
          <b>${p.name}</b><br>
          通勤时间: <b>${p.minutes ?? '–'} 分钟</b><br>
          <span style="color:${color};font-weight:600">${TIER_LABELS[p.tier]}</span>
        </div>`
      );
      infoWindow.open(map, [p.lng, p.lat]);
    });

    return poly;
  }).filter(Boolean);

  map.add(polygons);
  isoLayers = polygons;
}

// ── 标签模式（zoom >= ZOOM_DETAIL）───────────────────────────────────────────
//
// 每个小区显示一个彩色圆底 + 小区名 + 分钟数的 Marker
//
function renderLabels(points) {
  // 只渲染地图可视范围内的点，避免性能问题
  const bounds = map.getBounds();
  const visible = points.filter(p =>
    p.lat >= bounds.getSouthWest().lat - 0.02 &&
    p.lat <= bounds.getNorthEast().lat + 0.02 &&
    p.lng >= bounds.getSouthWest().lng - 0.02 &&
    p.lng <= bounds.getNorthEast().lng + 0.02
  );

  const markers = visible.map(p => {
    const color = TIER_COLORS[p.tier];
    const content = `
      <div style="
        background:${color};
        border-radius:4px;
        padding:3px 7px;
        font-size:11px;
        line-height:1.5;
        color:${p.tier <= 2 ? '#1a2a1a' : '#1a1a1a'};
        white-space:nowrap;
        box-shadow:0 1px 4px rgba(0,0,0,0.5);
        opacity:0.92;
        cursor:pointer;
      ">
        <div style="font-weight:600">${p.name}</div>
        <div style="font-size:10px">${p.minutes ?? '–'} 分钟</div>
      </div>`;

    const m = new AMap.Marker({
      position: [p.lng, p.lat],
      content,
      offset: new AMap.Pixel(-30, -22),
      zIndex: 50,
    });

    m.on('click', () => {
      if (!infoWindow) infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -8) });
      infoWindow.setContent(
        `<div style="padding:8px 10px;font-size:13px;line-height:1.8;color:#222">
          <b>${p.name}</b><br>
          通勤时间: <b>${p.minutes ?? '–'} 分钟</b><br>
          <span style="color:${color};font-weight:600">${TIER_LABELS[p.tier]}</span>
        </div>`
      );
      infoWindow.open(map, [p.lng, p.lat]);
    });

    return m;
  });

  map.add(markers);
  isoLayers = markers;
}

// ── 统一渲染入口 ──────────────────────────────────────────────────────────────
function renderIsochrone(data) {
  clearLayers();
  if (!data || !data.points || data.points.length === 0) return;

  const points = data.points.filter(p => p.tier !== null && p.lat && p.lng);
  if (points.length === 0) return;

  const zoom = map.getZoom();
  setStatus(`渲染 ${points.length} 个小区…`, 'loading');

  if (zoom < ZOOM_DETAIL) {
    renderVoronoi(points);
  } else {
    renderLabels(points);
  }

  setStatus(`${points.length} 个小区 · ${currentMode === 'driving' ? '驾车' : '公交'}`, 'ok');
}

async function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  if (!layerOn) return;
  setStatus('加载数据…', 'loading');
  const data = await loadData(mode);
  if (!data) {
    clearLayers();
    document.getElementById('no-data').style.display = 'block';
    setStatus('无数据', 'error');
    return;
  }
  document.getElementById('no-data').style.display = 'none';
  renderIsochrone(data);
}

function toggleLayer() {
  layerOn = !layerOn;
  document.getElementById('layer-toggle').classList.toggle('active', layerOn);
  if (layerOn) {
    switchMode(currentMode);
  } else {
    clearLayers();
    setStatus('图层已关闭');
  }
}

function placeTargetMarker(target) {
  if (targetMarker) map.remove(targetMarker);
  const marker = new AMap.Marker({
    position: [target.lng, target.lat],
    content: '<div class="target-marker"></div>',
    offset: new AMap.Pixel(-10, -10),
    zIndex: 200,
    title: target.name,
  });
  map.add(marker);
  targetMarker = marker;
  document.getElementById('target-name').textContent =
    target.name || `${target.lng.toFixed(4)}, ${target.lat.toFixed(4)}`;
}

function init() {
  map = new AMap.Map('map', {
    center: [121.4737, 31.2304],
    zoom: 11,
    mapStyle: 'amap://styles/dark',
    features: ['bg', 'road', 'building', 'point'],
  });

  setStatus('加载数据…', 'loading');
  loadData(currentMode).then(data => {
    if (data) {
      document.getElementById('no-data').style.display = 'none';
      const metaTarget = data._meta?.target;
      const storageTarget = getTargetFromStorage();
      const target = metaTarget
        ? { lng: metaTarget.lng, lat: metaTarget.lat, name: storageTarget?.name || '新漕河泾商务中心B座' }
        : storageTarget;
      if (target) {
        placeTargetMarker(target);
        map.setCenter([target.lng, target.lat]);
      }
      renderIsochrone(data);
    } else {
      const target = getTargetFromStorage();
      if (target) { placeTargetMarker(target); map.setCenter([target.lng, target.lat]); }
      else document.getElementById('target-name').textContent = '未设置';
      document.getElementById('no-data').style.display = 'block';
      setStatus('无预计算数据', 'error');
    }
  });

  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.mode));
  });
  document.getElementById('layer-toggle').addEventListener('click', toggleLayer);

  // 缩放时切换渲染模式
  map.on('zoomend', () => {
    if (layerOn && dataCache[currentMode]) renderIsochrone(dataCache[currentMode]);
  });

  // 平移后（标签模式）重新渲染可视区域
  map.on('moveend', () => {
    if (layerOn && dataCache[currentMode] && map.getZoom() >= ZOOM_DETAIL) {
      renderIsochrone(dataCache[currentMode]);
    }
  });
}

if (window.AMap) {
  init();
} else {
  window.onload = init;
}
</script>
</body>
</html>
